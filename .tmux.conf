##### CORE #####

unbind C-b
set -g prefix `
bind-key e send-prefix
bind-key ` last-window
bind | split-window -h
bind - split-window -v

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc"

set -g set-clipboard on
set -g mouse on
set -sg escape-time 10

set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi

set -g automatic-rename off
set -g allow-rename off

##### MONOKAI PRO THEME #####

# Barra arriba y fina
set -g status-position top
set -g status-interval 60

# Colors
monokai_bg="default"
monokai_fg="#fcfcfa"
monokai_dim="#727072"
monokai_yellow="#ffd866"
monokai_cyan="#78dce8"

# Status bar
set -g status-style "bg=${monokai_bg} fg=${monokai_fg}"
set -g status-left "#[fg=${monokai_cyan}] #S "
set -g status-right ""
set -g status-left-length 40

# Windows
set -g window-status-format "#[fg=${monokai_dim}] (#I) #W "
set -g window-status-current-format "#[fg=${monokai_yellow},bold] (#I) #W #[nobold]"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=${monokai_dim}"
set -g pane-active-border-style "fg=${monokai_yellow}"


# Move current window (tab) left / right
bind -r H swap-window -t -1
bind -r L swap-window -t +1

##### NAVIGATION #####
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R


##### RESIZE #####

bind -n M-h resize-pane -L 1
bind -n M-j resize-pane -D 1
bind -n M-k resize-pane -U 1
bind -n M-l resize-pane -R 1
